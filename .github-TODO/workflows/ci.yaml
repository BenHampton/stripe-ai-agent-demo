name: CI # TODO update repo settings with secrets

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/test
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      JWT_SECRET: test-jwt-secret-32chars-minimum!!
      API_KEY: test-api-key
      STRIPE_WEBHOOK_SECRET: whsec_test
      ALLOWED_ORIGINS: http://localhost:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Build the Docker image and push to Docker Hub
  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: [test-build]
    if: github.event_name == 'push' # skip on pull_request

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sai-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sai-backend:${{ github.ref_name == 'main' && 'latest' || 'dev' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max